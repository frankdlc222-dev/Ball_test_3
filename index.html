<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Ball Animation</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .arena {
      position: relative;
      width: 600px;
      height: 400px;
      background: linear-gradient(180deg, #16213e, #0f3460);
      border: 2px solid #4560e9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(69, 96, 233, 0.3);
    }

    .ball {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffcc80, #ff9800, #e65100);
      box-shadow: 0 0 15px rgba(255, 152, 0, 0.6), inset 0 -3px 6px rgba(0,0,0,0.3);
    }

    .shadow {
      position: absolute;
      width: 40px;
      height: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50%;
      bottom: 5px;
      filter: blur(3px);
    }

    .title {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 24px;
      align-items: center;
      color: #ccc;
      font-size: 14px;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls input[type="range"] {
      width: 120px;
      accent-color: #ffffff;
    }

    .controls span.value {
      min-width: 28px;
      text-align: right;
      color: #ffffff;
      font-weight: bold;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const ARENA_WIDTH = 600;
    const ARENA_HEIGHT = 400;
    const BALL_SIZE = 40;
    const DAMPING = 0.8;
    const FRICTION = 0.99;

    function createBall() {
      return {
        x: Math.random() * (ARENA_WIDTH - BALL_SIZE),
        y: Math.random() * (ARENA_HEIGHT / 2),
        vx: (Math.random() - 0.5) * 6,
        vy: 0,
      };
    }

    function BouncingBalls() {
      const [gravity, setGravity] = useState(0.3);
      const [numBalls, setNumBalls] = useState(1);
      const ballsRef = useRef([createBall()]);
      const [positions, setPositions] = useState(ballsRef.current.map(b => ({ x: b.x, y: b.y })));
      const animationRef = useRef();
      const gravityRef = useRef(gravity);

      gravityRef.current = gravity;

      // Sync ball count
      useEffect(() => {
        const current = ballsRef.current;
        if (numBalls > current.length) {
          for (let i = current.length; i < numBalls; i++) {
            current.push(createBall());
          }
        } else if (numBalls < current.length) {
          current.length = numBalls;
        }
      }, [numBalls]);

      const animate = useCallback(() => {
        const balls = ballsRef.current;
        const g = gravityRef.current;

        balls.forEach(ball => {
          ball.vy += g;
          ball.vx *= FRICTION;
          ball.x += ball.vx;
          ball.y += ball.vy;

          if (ball.y + BALL_SIZE > ARENA_HEIGHT) {
            ball.y = ARENA_HEIGHT - BALL_SIZE;
            ball.vy = -ball.vy * DAMPING;
          }
          if (ball.y < 0) {
            ball.y = 0;
            ball.vy = -ball.vy * DAMPING;
          }
          if (ball.x + BALL_SIZE > ARENA_WIDTH) {
            ball.x = ARENA_WIDTH - BALL_SIZE;
            ball.vx = -ball.vx * DAMPING;
          }
          if (ball.x < 0) {
            ball.x = 0;
            ball.vx = -ball.vx * DAMPING;
          }
        });

        setPositions(balls.map(b => ({ x: b.x, y: b.y })));
        animationRef.current = requestAnimationFrame(animate);
      }, []);

      useEffect(() => {
        animationRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animationRef.current);
      }, [animate]);

      const handleClick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        ballsRef.current.forEach(ball => {
          ball.x = clickX - BALL_SIZE / 2;
          ball.y = clickY - BALL_SIZE / 2;
          ball.vx = (Math.random() - 0.5) * 10;
          ball.vy = -8;
        });
      };

      return (
        <div className="wrapper">
          <div className="arena" onClick={handleClick}>
            <div className="title">Click anywhere to relaunch</div>
            {positions.map((pos, i) => {
              const shadowScale = 1 - (ARENA_HEIGHT - BALL_SIZE - pos.y) / ARENA_HEIGHT * 0.6;
              const shadowOpacity = 0.3 * shadowScale;
              return (
                <React.Fragment key={i}>
                  <div
                    className="shadow"
                    style={{
                      left: pos.x,
                      bottom: 5,
                      opacity: shadowOpacity,
                      transform: `scaleX(${shadowScale})`,
                    }}
                  />
                  <div
                    className="ball"
                    style={{ left: pos.x, top: pos.y }}
                  />
                </React.Fragment>
              );
            })}
          </div>
          <div className="controls">
            <label>
              Gravity
              <input type="range" min="0" max="1" step="0.05" value={gravity}
                onChange={e => setGravity(parseFloat(e.target.value))} />
              <span className="value">{gravity.toFixed(2)}</span>
            </label>
            <label>
              Balls
              <input type="range" min="1" max="20" step="1" value={numBalls}
                onChange={e => setNumBalls(parseInt(e.target.value))} />
              <span className="value">{numBalls}</span>
            </label>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BouncingBalls />);
  </script>
</body>
</html>
