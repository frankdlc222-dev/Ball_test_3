<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Ball Animation</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .arena {
      position: relative;
      width: 600px;
      height: 400px;
      background: linear-gradient(180deg, #16213e, #0f3460);
      border: 2px solid #e94560;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
    }

    .ball {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #e94560, #c0392b);
      box-shadow: 0 0 15px rgba(233, 69, 96, 0.6), inset 0 -3px 6px rgba(0,0,0,0.3);
    }

    .shadow {
      position: absolute;
      width: 40px;
      height: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50%;
      bottom: 5px;
      filter: blur(3px);
    }

    .title {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const ARENA_WIDTH = 600;
    const ARENA_HEIGHT = 400;
    const BALL_SIZE = 40;
    const GRAVITY = 0.3;
    const DAMPING = 0.8;
    const FRICTION = 0.99;

    function BouncingBall() {
      const ballRef = useRef({
        x: ARENA_WIDTH / 2 - BALL_SIZE / 2,
        y: 50,
        vx: 3,
        vy: 0,
      });
      const [pos, setPos] = useState({ x: ballRef.current.x, y: ballRef.current.y });
      const animationRef = useRef();

      const animate = useCallback(() => {
        const ball = ballRef.current;

        ball.vy += GRAVITY;
        ball.vx *= FRICTION;

        ball.x += ball.vx;
        ball.y += ball.vy;

        // Floor bounce
        if (ball.y + BALL_SIZE > ARENA_HEIGHT) {
          ball.y = ARENA_HEIGHT - BALL_SIZE;
          ball.vy = -ball.vy * DAMPING;
        }

        // Ceiling bounce
        if (ball.y < 0) {
          ball.y = 0;
          ball.vy = -ball.vy * DAMPING;
        }

        // Wall bounces
        if (ball.x + BALL_SIZE > ARENA_WIDTH) {
          ball.x = ARENA_WIDTH - BALL_SIZE;
          ball.vx = -ball.vx * DAMPING;
        }
        if (ball.x < 0) {
          ball.x = 0;
          ball.vx = -ball.vx * DAMPING;
        }

        setPos({ x: ball.x, y: ball.y });
        animationRef.current = requestAnimationFrame(animate);
      }, []);

      useEffect(() => {
        animationRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animationRef.current);
      }, [animate]);

      const handleClick = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        const ball = ballRef.current;
        ball.x = clickX - BALL_SIZE / 2;
        ball.y = clickY - BALL_SIZE / 2;
        ball.vx = (Math.random() - 0.5) * 10;
        ball.vy = -8;
      };

      const shadowScale = 1 - (ARENA_HEIGHT - BALL_SIZE - pos.y) / ARENA_HEIGHT * 0.6;
      const shadowOpacity = 0.3 * shadowScale;

      return (
        <div className="arena" onClick={handleClick}>
          <div className="title">Click anywhere to relaunch</div>
          <div
            className="shadow"
            style={{
              left: pos.x,
              bottom: 5,
              opacity: shadowOpacity,
              transform: `scaleX(${shadowScale})`,
            }}
          />
          <div
            className="ball"
            style={{
              left: pos.x,
              top: pos.y,
            }}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BouncingBall />);
  </script>
</body>
</html>
